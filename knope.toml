# Knope によるリリース自動化設定。
# バージョンの source of truth は pyproject.toml の [project.version]。
# Release PR をマージするとリリース（タグ + GitHub Release）が作成される。

[package]
changelog       = "CHANGELOG.md"
versioned_files = [ "pyproject.toml" ]

# main への push 契機で実行され、Release PR を作成・更新する。
[[workflows]]
name = "prepare-release"

[[workflows.steps]]
command = "git switch -c release"
type    = "Command"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
command = "git commit -m \"chore: prepare release $version\""
type    = "Command"

[[workflows.steps]]
command = "git push --force --set-upstream origin release"
type    = "Command"

[[workflows.steps]]
base = "main"
type = "CreatePullRequest"

[workflows.steps.title]
template = "chore: prepare release $version"

[workflows.steps.body]
template = "Knope により作成された Release PR です。マージするとリリースが作成されます。\n\n$changelog"

# Release PR のマージ契機で実行され、タグと GitHub Release を作成する。
[[workflows]]
name = "release"

[[workflows.steps]]
type = "Release"

[github]
owner = "toshiki670"
repo  = "dotfiles"
