# git-cliff: https://git-cliff.org/  (release-plz の CHANGELOG 生成に使用)
[changelog]
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}[**BREAKING**] {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/toshiki670/dotfiles/commit/{{ commit.id }}))
{% endfor %}\
{% endfor %}\
"""
footer = ""
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
trim = true

[git]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^revert", group = "Reverts" },
  { message = ".*", skip = true },
]
commit_preprocessors = [  ]
conventional_commits = true
filter_commits = true
filter_unconventional = true
protect_breaking_commits = true
sort_commits = "oldest"
split_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
