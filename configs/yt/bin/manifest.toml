# yt-dlp のリトライラッパースクリプトを ~/.local/bin へ配置する（copy 層 / 設計書 §5・§6 / Issue #558）。
#
# 旧 `bin/yt-retry`（トップレベル bin/、`$DOTFILES/bin` として fish PATH へ追加していたもの）の
# 置き換え。旧方式は fish 起動時に「リポジトリの作業ツリーが今どこにあるか」を chezmoi の
# `.chezmoi.config.sourceDir` テンプレートで焼き込んで解決しており、D2（symlink 不採用・
# cargo install 配布と非互換な「作業ツリーへの永続依存」を避ける）と衝突する。
#
# ~/.local/bin は configs/fish/conf.d/00-path.fish が既に PATH へ追加済みの場所なので、copy で
# ここへ実体を書き出せば `$DOTFILES` のような repo 位置の解決手段は一切不要になる（00-path.fish から
# `$DOTFILES/bin` の PATH 追加ごと削除できる）。
#
# when.profile = "private": yt-dlp は configs/yt の他の断片（30-yt.fish）と同じくプライベート環境
# 限定（§5.5・§9.2）。abbr 側だけ private gate してリトライスクリプトを全マシンに置くと、
# 「非 private マシンでは yt コマンドが無いのにリトライラッパーだけ残る」ちぐはぐな状態になるため
# 揃える。
dst        = "~/.local/bin"
executable = true
when       = { profile = "private" }
