# Stats（メニューバー型システムモニタアプリ）の preference plist を配置する。生きたドメインの
# export を土台に dotfiles 管理サブセットを重ね、defaults import で cfprefsd 管轄のライブドメインへ
# 反映する。macOS ネイティブアプリの preference plist を一級扱いする最初の実例（#531 / #560。
# 決定経緯は #453#issuecomment-4756549971 / #465）。
#
#   1. input.cmd（生きたドメインを土台に）= `defaults export eu.exelban.Stats -` の標準出力（plist。
#      生きたドメイン全体。Window Frame・メニューバー位置などローカル状態を含む）。ドメイン未作成
#      （Stats 未起動の初回 apply）でも `defaults export` は空 dict を返す（exit 0）ので土台なしと
#      同じに扱える。
#   2. dotfiles 管理サブセット（Stats.plist・shallow）= ノイズキー除去済み。AppKit の UI 状態
#      （Window Frame・`NSToolbar Configuration …` 等）に加え、Stats 自身が内部で自動更新する
#      ブックキーピング／実測値（`version` / `support_ts` / `updater_check_ts` / `updater_install_ts` /
#      `fan_0_speed` 等）も除去済み ― これらは dotfiles 管理サブセットに含めて固定すると、apply の
#      たびに Stats の実バージョン情報や実測値をスナップショット時点の古い値へ巻き戻してしまう
#      （ユーザー設定ではなく Stats 自身が書く値なので、土台（生きたドメイン）にそのまま委ねる）。
#      土台の上に重なり、dotfiles 所有キーだけを上書きする（shallow・トップレベル粒度）。
#   3. output.cmd（`defaults import eu.exelban.Stats -`）= 合成済みの内容を標準入力へ渡し、ライブドメインへ
#      反映する。毎 apply 実行され、コマンドが冪等であることを契約とする（#531 が実機検証して出荷済みの
#      挙動）。これで旧構成の使い捨て下書きファイル（~/.cache/dotfiles/…）と hooks（frequency=always）は
#      不要になった ― 生きた状態が毎 apply 合成に入り、書き戻しで結果が収束する。
#
# when.deps=["defaults"]: input.cmd が `defaults` を呼ぶため、無い環境（テスト等）ではユニットごと
#   skip する（既存 E2E の空 PATH 下でも安全に skip される）。
# when.os="darwin": Stats は macOS 専用アプリ。
format = "plist"
when   = { deps = [ "defaults" ], os = "darwin" }

[[steps]]
input.cmd = [ "defaults", "export", "eu.exelban.Stats", "-" ]

[[steps]]
input = "Stats.plist"
merge = "shallow"

[[steps]]
output.cmd = [ "defaults", "import", "eu.exelban.Stats", "-" ]
