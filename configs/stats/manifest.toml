# Stats（メニューバー型システムモニタアプリ）の preference plist を配置する。
#
# Stats.plist は dotfiles 管理サブセット（AppKit の UI 状態と、Stats 自身が内部で自動更新する
# ブックキーピング／実測値 `version` / `support_ts` / `updater_check_ts` / `updater_install_ts` /
# `fan_0_speed` 等は除去済み）。これらを含めて固定すると、apply のたびに実バージョンや実測値を
# スナップショット時点の古い値へ巻き戻してしまうため、生きたドメイン（input.cmd の
# `defaults export`）にそのまま委ねる。
#
# when.deps=["defaults"]: 無い環境（テスト等）ではユニットごと skip する。
# when.os="darwin": Stats は macOS 専用アプリ。
format = "plist"
when   = { deps = [ "defaults" ], os = "darwin" }

[[steps]]
input.cmd = [ "defaults", "export", "eu.exelban.Stats", "-" ]

[[steps]]
input = "Stats.plist"
merge = "shallow"

[[steps]]
output.cmd = [ "defaults", "import", "eu.exelban.Stats", "-" ]
