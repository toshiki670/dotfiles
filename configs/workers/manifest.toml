# バックグラウンド worker（daily-check・git-background-fetch サブコマンド、src/bin/workers。
# 単一 bin `workers` として ~/.cargo/bin に入る）を起動する fish の conf.d 断片を配置する。
# Issue #558・#584
#
# dst は fish の conf.d（複数ツールが断片を持ち寄る合流点。eza の 40-eza.fish 等と同じ場所）。
# 中身は各 worker バイナリの呼び出しグルーコードで fish 本体（configs/fish）ではなくここに置く。
# ファイル名の番号 prefix (60-/70-) が読み込み順を表す。
dst = "~/.config/fish/conf.d"
