# bat の設定 + カスタムテーマ（themes/ayu-dark.tmTheme）。
# 設計: docs/dotfiles-native-design.md §6・§13
#
# サブディレクトリ themes/ も相対構造を保って再帰配置される（ディレクトリ単位 copy）。
# kind は省略時 "copy"。
#
# when.deps（トップレベル when ＝ ユニットスコープ gate, §5.5・§7）: bat が PATH に無い環境では
# ユニットごと skip（配置も hooks も走らない）。bat が無ければ設定もテーマキャッシュ（bat/delta が
# 使う ayu-dark）も無意味なので、まるごと gate する。
#
# hooks: 配置後にソース（このユニットの中身）が前回適用時から変われば `bat cache --build` を
# 実行し、カスタムテーマ ayu-dark を bat/delta に登録し直す（onchange, §13）。フックは
# 「実行するコマンド（argv）」をデータとして宣言する（binary はツール名を持たず実行するだけ）。
# 旧 chezmoi run_onchange_after_build-bat-cache の移植。
#
# theme = "self"（§7・§10.2.1）: bat は自前で端末背景を検出する（config の --theme=auto が OSC11 で
#   light/dark を選ぶ）。Ghostty を起点に固定すれば背景が変わり bat も自然に追従する ― 役割宣言のみ。
dst   = "~/.config/bat"
hooks = [ [ "bat", "cache", "--build" ] ]
theme = "self"
when  = { deps = [ "bat" ] }
