# Claude Code の settings.json を配置する。宛先の現在内容を土台に読み（optional）、dotfiles 所有
# キーを shallow でリセットし、rtk 断片を重ねる ― app 自身が書くトップレベルキー（`model` /
# `effortLevel` 等）は保たれ、共有キー（hooks / statusLine / language / theme / voiceEnabled）は
# 断片が常に勝つ。
#
# 注: rtk.json は rm→trash ガードを含む hooks 全体を持つ（settings.json と一部重複する）。これは
# 「rtk hook だけ条件付き」を deep merge 無しで表現する暫定コスト（deep 化はスライス2）。rm ガードを
# 変えるときは settings.json と rtk.json の両方を直すこと。
format = "json"

# 宛先の現在内容を土台に（app 所有キーを保持）。初回 apply ではまだ無いため optional。
[[steps]]
input    = "~/.claude/settings.json"
optional = true

# dotfiles 所有キーを shallow でリセットする。
[[steps]]
input = "settings.json"
merge = "shallow"

# rtk 断片: rtk が PATH にある時だけ重ねる。`when` で表現することで、rtk が無い環境でも
# hooks 全体が壊れる（無条件化の回帰）のを防ぐ。
[[steps]]
input = "rtk.json"
merge = "shallow"
when  = { deps = [ "rtk" ] }

[[steps]]
output = "~/.claude/settings.json"
