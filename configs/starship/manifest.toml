# starship の設定を ~/.config 直下へ配置する（ツリー配置）。
#
# output=~/.config（ディレクトリ）。配下の starship.toml を相対構造のまま配置し
# ~/.config/starship.toml に置く。~/.config 配下の他ツール設定には触れない。
#
# fish/（fish 起動連携 `starship init fish` を conf.d 合流点へ置く別単位）はサブ manifest を
# 持つので、このツリー配置からは委譲され除外される（claude の settings/ と同じ関係）。
#
# starship.toml 先頭の `$schema` は starship 公式のスキーマ URL を設定。
# エディタや taplo はこの URL を取得して設定を検証する。
#
# merge-ready 連携: [custom.merge_ready] 節は merge-ready-prompt を呼ぶプロンプトモジュール。
# 旧 tmpl は `{{ if lookPath "merge-ready" }}` で節ごと出し分けていたが、starship の custom
# module は `when`（shell コマンド・終了 0 で表示）を持つので、節は常時置きつつ
# `when = "command -v merge-ready-prompt"` で自己 gate する。merge-ready 不在マシンでは
# starship 自身が節を非表示にするため、出し分けと挙動は等価で、配置は単純 copy に保てる
# （条件分岐を engine へ持ち込まず、表示可否という starship 固有の意図を starship の
# 設定そのものに宿す）。
[[steps]]
input = "."

[[steps]]
output = "~/.config"
