# starship の fish 連携（起動時に `starship init fish` を source）を conf.d 合流点へ copy する。
# Issue #558
#
# dst は fish の conf.d（複数ツールが断片を持ち寄る合流点。eza の 40-eza.fish 等と同じ場所）。
# 親 configs/starship/manifest.toml は dst=~/.config へのツリー copy（starship.toml を配置）だが、
# このディレクトリは別 manifest を持つので委譲され、~/.config/fish 側からは触れない。
# ファイル名の番号 prefix (95-) が読み込み順を表す（プロンプトは fish 起動の最終段で初期化する）。
dst = "~/.config/fish/conf.d"
