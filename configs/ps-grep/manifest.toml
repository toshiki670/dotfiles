# ps-grep（バイナリ化なしの純 fish 関数）を fish の functions 合流点へ copy する。
# Issue #567
#
# 配置先は fish の functions（conf.d・completions と同様、複数ツールが断片を持ち寄る合流点）。
# fzf-picker / gh-clone と違い帰属先の Rust バイナリを持たず、ps-grep 自身が独立したツールとして
# fish 本体（configs/fish）ではなく独立したツールディレクトリとしてここに置く。

[[steps]]
input = "."

[[steps]]
output = "~/.config/fish/functions"
