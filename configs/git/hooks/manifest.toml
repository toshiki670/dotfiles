# git hooks を配置する（ツリー配置 ＋ 配置後のリンク生成 output.cmd）。
#
# 全 hook 種別は同じ内容（`dispatch`）を起動名で分岐するだけなので、13 個複製 copy せず
# `dispatch` 1 本だけを copy し、hook 名 13 本は配置後の output.cmd で `dispatch` への symlink
# として生成する（`ln -sf` は既存リンクを置き換えるので毎 apply 実行しても安全）。
#
# when.deps = ["sh"]: この output.cmd は sh で書くので、sh が PATH に無い環境ではユニットごと
#   skip する（bat / ghostty が自分のバイナリを when.deps で gate するのと同じ ― output.cmd の
#   実行ファイルが未解決なら apply を止めるより単位ごと見送る）。
#
# core.hooksPath はここではなく configs/git/configs/core が ~/.config/git/hooks を指す（移行済み）。
executable = true
when       = { deps = [ "sh" ] }

[[steps]]
input = "."

[[steps]]
output = "~/.config/git/hooks"

[[steps]]
output.cmd = [
  "sh",
  "-c",
  "cd \"$HOME/.config/git/hooks\" && for h in applypatch-msg commit-msg post-applypatch post-checkout post-commit post-merge post-rewrite pre-applypatch pre-commit pre-merge-commit pre-push pre-rebase prepare-commit-msg; do ln -sf dispatch \"$h\"; done",
]
