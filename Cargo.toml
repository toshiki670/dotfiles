[package]
description = "toshiki670/dotfiles の CLI コマンド群"
edition     = "2024"
license     = "MIT"
name        = "dotfiles"
publish     = false
repository  = "https://github.com/toshiki670/dotfiles"
version     = "0.68.0"

# 各コマンドは src/bin/<name>/main.rs に置き、Cargo の自動検出に任せる
# （[[bin]] の明示は不要）。共有ロジックは src/lib.rs。

[dependencies]
clap     = { version = "4", features = [ "derive" ] }
ignore   = "0.4"
libc     = "0.2"
tempfile = "3"

[profile.release]
strip = true
