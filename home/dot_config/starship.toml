[git_branch]
symbol = " "
format = '[$symbol$branch(:$remote_branch) ]($style)'

[git_commit]
tag_symbol = '  '

[git_state]
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry-pick"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[git_metrics]
disabled = false

[git_status]
ahead = '[⇡${count}](green)'
diverged = '⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
stashed = ''
modified = '!${count}'
format = '([$all_status$ahead_behind ]($style))'

