"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_blue)\
$directory\
[](fg:color_bg3 bg:color_blue)\
$git_branch\
$git_state\
$git_status\
[](fg:color_bg1 bg:color_bg3)\
[](color_bg1)\
$line_break\
$character"""


palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[directory]
truncation_length = 0
style = "fg:color_fg0 bg:color_blue"
repo_root_style = "bold fg:color_fg0 bg:color_blue"
format = "[ $path ]($style)"
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path ]($style)"
[git_branch]
symbol = ""
style = "fg:color_fg0 bg:color_bg3"
format = '[ $symbol $branch ]($style)'

[git_state]
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry-pick"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"
style = "fg:color_fg0 bg:color_bg3"
format = '[$state( $progress_current/$progress_total) ]($style)'

[git_status]
style = "fg:color_fg0 bg:color_bg3"
format = '[($all_status$ahead_behind )]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'

