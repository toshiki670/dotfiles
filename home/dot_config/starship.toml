# No $schema: Nix CI taplo cannot fetch HTTPS in the Linux sandbox; add the Starship JSON schema in your editor if needed.

[aws]
symbol = " "
format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'

[buf]
symbol = " "
format = '[$symbol($version )]($style)'

[bun]
symbol = " "

[c]
symbol = " "

[cpp]
symbol = " "

[cmake]
symbol = " "

[cmd_duration]
format = '[ $duration]($style) '

[conda]
symbol = " "

[crystal]
symbol = " "

[dart]
symbol = " "

[deno]
symbol = " "

[directory]
read_only = " 󰌾"
truncation_length = 0
truncate_to_repo = true
style = 'bold cyan'
repo_root_style = 'bold blue'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '

[docker_context]
symbol = " "
format = '[$symbol$context ]($style)'

