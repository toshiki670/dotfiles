[tool.ruff]
line-length    = 88
target-version = "py313"

[tool.ruff.lint]
select = [ "E", "F", "I" ]

[tool.pytest.ini_options]
testpaths = [ "tests/lint" ]

[tool.mypy]
files               = [ "nix/lint", "tests/lint" ]
mypy_path           = [ "nix" ]
python_version      = "3.13"
strict              = true
warn_unused_configs = true
