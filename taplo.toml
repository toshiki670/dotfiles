# Global Taplo defaults for every *.toml in this repo (auto-discovered as taplo.toml).
# starship.toml はファイル先頭の `$schema`（→ home/dot_config/starship-config-schema.json）で
# エディタ/taplo がスキーマ検証する。Nix 撤去で外部取得制約が無くなったため、
# Nix 用の vendored schema rule（schemas/ + sync）は撤去した。

[formatting]
# Stricter, more uniform layout than Taplo defaults.
align_entries        = true
allowed_blank_lines  = 1
array_trailing_comma = true
column_width         = 88
compact_arrays       = false
reorder_keys         = true
