# Global Taplo defaults for every *.toml in this repo (auto-discovered as taplo.toml).
# starship.toml はファイル先頭の `$schema`（https://starship.rs/config-schema.json）で
# エディタ/taplo がスキーマ検証する。以前は同梱 schema を ~/.config へ deploy していたが、
# ネットワーク参照に寄せた（configs/starship/manifest.toml 参照）。

[formatting]
# Stricter, more uniform layout than Taplo defaults.
align_entries        = true
allowed_blank_lines  = 1
array_trailing_comma = true
column_width         = 88
compact_arrays       = false
reorder_keys         = true
