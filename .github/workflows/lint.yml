name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-lint-runner-changes:
    name: Detect lint runner changes
    runs-on: ubuntu-latest
    outputs:
      lint_runner: ${{ steps.filter.outputs.lint_runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            lint_runner:
              - "nix/lint.py"
              - "nix/lint/**"
              - "tests/lint/**"
              - "pyproject.toml"
              - "flake.nix"
              - "taplo.toml"
              - "schemas/starship-config-schema.json"

  flake-check:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Nix flake check
        run: nix flake check -L

  starship-schema-up-to-date:
    name: Starship schema matches upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compare vendored schema to starship.rs
        env:
          UPSTREAM_URL: https://starship.rs/config-schema.json
          VENDORED_PATH: schemas/starship-config-schema.json
        run: |
          set -euo pipefail
          curl -fsSL "$UPSTREAM_URL" | jq -S . > /tmp/starship-schema-upstream.json
          jq -S . < "$VENDORED_PATH" > /tmp/starship-schema-vendored.json
          if ! cmp -s /tmp/starship-schema-vendored.json /tmp/starship-schema-upstream.json; then
            echo "::error::${VENDORED_PATH} is out of sync with ${UPSTREAM_URL} (after jq -S canonicalization)."
            diff -u /tmp/starship-schema-vendored.json /tmp/starship-schema-upstream.json | head -n 120 || true
            echo "Run ./bin/sync-starship-config-schema and commit the result."
            exit 1
          fi

  lint-runner-tests:
    name: Lint runner tests
    runs-on: ubuntu-latest
    needs: detect-lint-runner-changes
    if: needs.detect-lint-runner-changes.outputs.lint_runner == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Lint runner tests
        run: nix run .#lint-tests
