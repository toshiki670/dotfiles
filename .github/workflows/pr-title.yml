name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-pr-title:
    name: check-pr-title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash .github/bin/check-pr-title.sh
