name: Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cargo:
    name: cargo fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.140

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo nextest run --workspace --locked

      # intra-doc リンク腐敗の恒久ガード（main.rs の #![deny(rustdoc::broken_intra_doc_links)]）。
      # rustdoc lint は cargo doc 実行時のみ効くため、CI でリンク切れを検出する。
      - name: Doc check (broken intra-doc links)
        run: cargo doc -p dotfiles --no-deps --locked --document-private-items

  apply-test:
    name: dotfiles apply (fresh machine bootstrap)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install mise (supplies rust)
        uses: jdx/mise-action@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo install (distributable commands)
        run: cargo install --path . --locked

      - name: dotfiles apply (embedded configs, no working tree)
        run: |
          # clone 無しの配布経路: CWD が作業ツリー外なら埋め込み configs を使う。
          cd "$HOME"
          dotfiles local set git.email ci@example.com
          dotfiles local set git.name "CI"
          dotfiles apply

      - name: Verify dotfiles apply placed configs
        run: |
          test -f "$HOME/.config/git/config"
          test -d "$HOME/.config/fish/conf.d"

      - name: Verify distributable Rust commands were installed to ~/.cargo/bin
        run: |
          # 配布物は root dotfiles パッケージ 1 つに統合済み。一度の cargo install で全 bin が入る。
          # fzf-picker / upkeep / workers は #584 でサブコマンド化し各 family 1 bin に集約。
          # root dotfiles（core）
          test -x "$HOME/.cargo/bin/dotfiles"
          "$HOME/.cargo/bin/dotfiles" --version
          # 各コマンド（存在のみ確認。外部ツール依存のものは実行しない）
          for bin in clip gcm gh-clone git-upstream fzf-picker upkeep workers; do
            test -x "$HOME/.cargo/bin/$bin"
          done
          # サブコマンドの存在確認（--help のみ、外部ツール非依存）
          "$HOME/.cargo/bin/fzf-picker" cdabbr --help
          "$HOME/.cargo/bin/fzf-picker" fzf-gh --help
          "$HOME/.cargo/bin/fzf-picker" fzf-ghq-cd --help
          "$HOME/.cargo/bin/fzf-picker" fzf-worktree-remove --help
          "$HOME/.cargo/bin/upkeep" cleanup --help
          "$HOME/.cargo/bin/upkeep" upgrade --help
          "$HOME/.cargo/bin/workers" daily-check --help
          "$HOME/.cargo/bin/workers" git-background-fetch --help
          # スモーク（外部ツール非依存のもののみ）
          "$HOME/.cargo/bin/dotfiles" color sample | head -1
          "$HOME/.cargo/bin/git-upstream" --help

      - name: Verify dev/maintenance-only tools were NOT installed
        run: |
          # tools/ 配下は repo 内部の開発・保守ツール（非 install）。~/.cargo/bin に入らない。
          # v-sync は #485 で配布終了（保守ツール化）。
          for bin in dotfiles-lint v-sync; do
            if [ -e "$HOME/.cargo/bin/$bin" ]; then
              echo "error: $bin must not be installed to ~/.cargo/bin" >&2
              exit 1
            fi
          done
