name: Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cargo:
    name: cargo fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  apply-test:
    name: chezmoi apply (fresh machine bootstrap)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install mise (supplies rust)
        uses: jdx/mise-action@v2

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: chezmoi init + apply (runs the cargo-install hook)
        run: |
          chezmoi init --source="$GITHUB_WORKSPACE"
          chezmoi apply --verbose --force

      - name: Verify Rust commands were installed to ~/.cargo/bin
        run: |
          test -x "$HOME/.cargo/bin/color"
          test -x "$HOME/.cargo/bin/git-upstream"
          "$HOME/.cargo/bin/color" | head -1
          "$HOME/.cargo/bin/git-upstream" --help
