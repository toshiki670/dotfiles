name: Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cargo:
    name: cargo fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      # intra-doc リンク腐敗の恒久ガード（main.rs の #![deny(rustdoc::broken_intra_doc_links)]）。
      # rustdoc lint は cargo doc 実行時のみ効くため、CI でリンク切れを検出する。
      - name: Doc check (broken intra-doc links)
        run: cargo doc -p dotfiles --no-deps --locked

  apply-test:
    name: chezmoi apply (fresh machine bootstrap)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install mise (supplies rust)
        uses: jdx/mise-action@v4

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: chezmoi apply (runs the cargo-install hook)
        run: chezmoi apply --source="$GITHUB_WORKSPACE" --verbose --force

      - name: Verify distributable Rust commands were installed to ~/.cargo/bin
        run: |
          # 配布物は root dotfiles パッケージ 1 つに統合済み。一度の cargo install で全 bin が入る。
          # root dotfiles（core）
          test -x "$HOME/.cargo/bin/dotfiles"
          "$HOME/.cargo/bin/dotfiles" --version
          # 各コマンド + fzf-picker / env-tools の各 bin（存在のみ確認。外部ツール依存のものは実行しない）
          for bin in clip gcm gh-clone git-upstream \
                     cdabbr fzf-gh fzf-ghq-cd fzf-worktree-remove \
                     cleanup-env upgrade-env; do
            test -x "$HOME/.cargo/bin/$bin"
          done
          # バックグラウンド worker
          test -x "$HOME/.cargo/bin/daily-check-worker"
          test -x "$HOME/.cargo/bin/git-background-fetch-worker"
          # スモーク（外部ツール非依存のもののみ）
          "$HOME/.cargo/bin/dotfiles" color sample | head -1
          "$HOME/.cargo/bin/git-upstream" --help

      - name: Verify dev/maintenance-only tools were NOT installed
        run: |
          # tools/ 配下は repo 内部の開発・保守ツール（非 install）。~/.cargo/bin に入らない。
          # v-sync は #485 で配布終了（保守ツール化）。removed_crates が旧バイナリも掃除する。
          for bin in dotfiles-lint v-sync; do
            if [ -e "$HOME/.cargo/bin/$bin" ]; then
              echo "error: $bin must not be installed to ~/.cargo/bin" >&2
              exit 1
            fi
          done
